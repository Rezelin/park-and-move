<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d001a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🚗 Pitstop Fitness</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Boogaloo&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- MAIN SCREEN -->
  <div id="screen-main" class="screen active">
    <div class="main-content">

      <div class="title-block">
        <div class="title-deco">★ ★ ★</div>
        <h1>🚗 PITSTOP<br>FITNESS</h1>
        <p class="subtitle">MOVE WHILE YOU WAIT</p>
      </div>

      <!-- Mode Selection -->
      <div class="mode-section">
        <p class="mode-label">WHERE ARE YOU?</p>
        <div class="mode-toggle">
          <button class="mode-btn active" id="btn-outcar" onclick="selectMode('outOfCar')">
            🏃 OUT OF CAR
          </button>
          <button class="mode-btn" id="btn-incar" onclick="selectMode('inCar')">
            🚗 IN CAR
          </button>
        </div>
      </div>

      <!-- Time Buttons -->
      <div class="time-section">
        <p class="mode-label">HOW LONG?</p>
        <div class="time-buttons">
          <button class="time-btn" onclick="startRoutine(30)">
            <span class="time-label">30</span>
            <span class="time-unit">SEC</span>
          </button>
          <button class="time-btn" onclick="startRoutine(60)">
            <span class="time-label">1</span>
            <span class="time-unit">MIN</span>
          </button>
          <button class="time-btn" onclick="startRoutine(120)">
            <span class="time-label">2</span>
            <span class="time-unit">MIN</span>
          </button>
        </div>
      </div>

      <div class="safety-line">
        Use only when safely parked. Know your limits.
        <a href="safety.html">Safety Guidelines</a>
      </div>

    </div>
    <div class="ad-placeholder"><span>ADVERTISEMENT</span></div>
  </div>

  <!-- ROUTINE SCREEN -->
  <div id="screen-routine" class="screen">
    <div class="routine-header">
      <h2 id="routine-title">YOUR ROUTINE</h2>
      <p class="routine-safety">🚗 Vehicle in park? Space to move? Let's go!</p>
    </div>

    <div class="routine-scroll">
      <div id="exercise-list"></div>
    </div>

    <div class="routine-footer">
      <button class="done-btn" onclick="finishRoutine()">✔ DONE!</button>
      <div class="ad-placeholder"><span>ADVERTISEMENT</span></div>
    </div>
  </div>

  <!-- CONFETTI OVERLAY -->
  <div id="confetti-overlay"></div>

  <script src="script.js"></script>
</body>
</html>
